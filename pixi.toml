[workspace]
channels = ["conda-forge"]
name = "numpy-wheel-build"
platforms = ["linux-64"]

[tasks]
build = "python -m build --installer=uv -w"

[dependencies]
c-compiler = "*"
cxx-compiler = "*"
fortran-compiler = "*"
pkg-config = "*"
python = "*"
uv = "*"

[pypi-dependencies]
build = { git = "https://github.com/mgorny/build", branch = "variant-deps" }

[feature.mkl.dependencies]
mkl-devel = "*"

[feature.openblas.dependencies]
openblas = "*"

[environments]
mkl = ["mkl"]
openblas = ["openblas"]
